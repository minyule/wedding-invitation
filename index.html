<!doctype html>
<html lang="ko">
  <head>
    <link rel="icon" href="asset/image/common/favicon.svg" type="image/svg+xml" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The Wedding Day : 낙훈 & 민영</title>
    <meta property="og:title" content="낙훈 · 민영 결혼합니다" />
    <meta property="og:description" content="2026.08.29 | 저희의 새로운 시작을 축하해 주세요." />
    <meta property="og:image" content="asset/image/1/main-image.jpg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="1200" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sections/cover.css">
    <link rel="stylesheet" href="css/sections/intro.css">
    <link rel="stylesheet" href="css/sections/calendar.css">
    <link rel="stylesheet" href="css/sections/gallery.css">
    <link rel="stylesheet" href="css/sections/location.css">
    <link rel="stylesheet" href="css/sections/account.css">
    <link rel="stylesheet" href="css/sections/share.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.1/kakao.min.js"></script>
    <!-- <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f913a3646c67604a42f9b4eb3ac8ad0d&libraries=services"></script> -->
  </head>
  <body>
    <img src="asset/image/1/main-image.jpg" style="display: none !important;" alt="미리보기용" />
    <main id="app">
      <section id="cover" class="section cover" aria-label="Cover">

        <!-- 사진 영역 -->
        <div class="cover__photo">
          <div class="greeting-image-wrapper">
            <img id="main-image" alt="메인 이미지" class="cover__bg" loading="eager" fetchpriority="high" />
            <div class="prevent-overlay"></div> </div>
          <h1 class="cover__title" id="cover__title">Our Beginning</h1>
        </div>

        <!-- 하단 정보 영역 -->
        <div class="cover__details">
          <p class="cover__names"></p>
          <p class="cover__datetime"></p>
          <p class="cover__venue"></p>
        </div>

      </section>

      <section id="greeting" class="section greeting" aria-label="Invitation">

        <!-- 종이 질감 배경 -->
        <div class="greeting__texture" aria-hidden="true"></div>

        <!-- 상단 그라데이션 페이드 -->
        <div class="greeting__fade greeting__fade--top" aria-hidden="true"></div>

        <div class="greeting__inner">

          <!-- 상단 divider -->
          <div class="divider">
            <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
          </div>

          <!-- 타이틀 -->
          <h2 class="title">Invitation</h2>

          <!-- 인사말 -->
          <div class="greeting__text"></div>

        </div>

        <!-- 중간 사진 (풀 width — inner 밖) -->
        <div class="greeting__photo">
          <div class="greeting-image-wrapper">
            <img id="sub-image" alt="서브 이미지" loading="lazy" />
            <div class="prevent-overlay"></div> </div>
        </div>

        <div class="greeting__inner">

          <!-- 혼주 정보 -->
          <div class="greeting__parents"></div>

          <!-- 하단 divider -->
          <div class="divider">
            <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
          </div>

        </div>

        <!-- 하단 그라데이션 페이드 -->
        <div class="greeting__fade greeting__fade--bottom" aria-hidden="true"></div>

      </section>

      <section id="calendar" class="section calendar" aria-label="Wedding Day">

        <div class="calendar__inner">
          <h2 class="title">Wedding Day</h2>
          <p class="calendar__month" id="calMonthLabel"></p>

          <table class="calendar__table" role="grid" aria-label="달력">
            <thead>
              <tr id="calHead"></tr>
            </thead>
            <tbody id="calBody"></tbody>
          </table>
        </div>

      </section>

      <div class="divider">
        <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
      </div>

      <section id="location" class="section location" aria-label="Location">

        <div class="location__inner">

          <!-- 타이틀 -->
          <h2 class="title">Location</h2>

          <!-- 예식장명 -->
          <p class="location__venue-name"></p>

          <!-- 주소 -->
          <address class="location__address"></address>

          <!-- 약도 이미지 -->
          <div class="location__map-img">
            <img src="asset/image/common/map.jpg" alt="약도 이미지" loading="lazy" />
          </div>

          <!-- 길찾기 버튼 3개 -->
          <div class="location__nav-buttons" role="group" aria-label="길찾기">

            <!-- T MAP -->
            <a class="nav-btn"
              id="btnTmap"
              href="https://tmap.life/d2eea2f4"
              target="_blank" rel="noopener"
              aria-label="T맵으로 길찾기">
              <img src="asset/image/common/icon-tmap.png" alt="T MAP" class="nav-btn__icon" />
            </a>

            <!-- 카카오맵 -->
            <a class="nav-btn"
              id="btnKakaoMap"
              href="https://kko.to/ZuJQ8r42vA"
              target="_blank" rel="noopener"
              aria-label="카카오맵으로 길찾기">
              <img src="asset/image/common/icon-kakao.png" alt="카카오맵" class="nav-btn__icon" />
            </a>

            <!-- 네이버지도 -->
            <a class="nav-btn"
              id="btnNaverMap"
              href="https://map.naver.com/v5/search/라도무스아트센터웨딩홀"
              target="_blank" rel="noopener"
              aria-label="네이버지도로 길찾기">
              <img src="asset/image/common/icon-naver.png" alt="네이버지도" class="nav-btn__icon" />
            </a>

          </div>

          <!-- 교통편 안내 -->
          <div class="location__transport"></div>
        </div>
      </section>

      <!-- 하단 divider -->
      <div class="divider">
        <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
      </div>

      <section class="section gallery" aria-label="Gallery">

        <h2 class="title">Gallery</h2>

        <!-- JS가 동적으로 채움 -->
        <div class="gallery__grid" id="galleryGrid" role="list"></div>
        
        <div id="galleryDescription" class="description"></div>
      </section>

      <div class="divider">
        <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
      </div>

      <!-- 라이트박스: body 직접 자식 (position:fixed가 overflow에 갇히지 않도록) -->
      <div class="lightbox" id="lightbox" role="dialog" aria-modal="true"
          aria-label="사진 크게 보기" hidden>

        <!-- 닫기 버튼 -->
        <button class="lightbox__close" id="lightboxClose" aria-label="닫기" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <!-- 슬라이드 트랙 -->
        <div class="lightbox__track-wrap" id="lightboxTrackWrap">
          <div class="lightbox__track" id="lightboxTrack"></div> 
        </div>

        <!-- 이전/다음 버튼 -->
        <button class="lightbox__arrow lightbox__prev" id="lightboxPrev"
                aria-label="이전 사진" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <button class="lightbox__arrow lightbox__next" id="lightboxNext"
                aria-label="다음 사진" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

        <!-- 카운터 -->
        <div class="lightbox__counter" id="lightboxCounter" aria-live="polite"></div>

      </div>

      <section id="account" class="section account" aria-label="Account">
        <div class="account__inner">

          <h2 class="title">Account</h2>

          <div class="account__desc"></div>

          <!-- 신랑측 -->
          <div class="accordion">
            <button class="accordion__trigger" aria-expanded="false"
                    aria-controls="panelGroom" id="triggerGroom" type="button">
              <span class="accordion__label">
                <span class="font-default">신랑측</span>
              </span>
              <span class="accordion__icon" aria-hidden="true"></span>
            </button>
            <div class="accordion__panel" id="panelGroom"
                role="region" aria-labelledby="triggerGroom">
              <div class="accordion__panel-inner">
                <!-- account.js가 동적으로 삽입 -->
              </div>
            </div>
          </div>

          <!-- 신부측 -->
          <div class="accordion">
            <button class="accordion__trigger" aria-expanded="false"
                    aria-controls="panelBride" id="triggerBride" type="button">
              <span class="accordion__label">
                <span class="font-default">신부측</span>
              </span>
              <span class="accordion__icon" aria-hidden="true"></span>
            </button>
            <div class="accordion__panel" id="panelBride"
                role="region" aria-labelledby="triggerBride">
              <div class="accordion__panel-inner">
                <!-- account.js가 동적으로 삽입 -->
              </div>
            </div>
          </div>

        </div>

      </section>

      <div class="divider">
        <img src="asset/image/common/divider.png" alt="" aria-hidden="true" />
      </div>

      <!-- 토스트 -->
      <div class="toast" id="copyToast" role="status" aria-live="polite">
        복사되었습니다
      </div>

      <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" defer></script>

      <section class="section share">
        
        <div class="share__inner">
          <h2 class="title">Share</h2>
          
          <button type="button" class="btn-share font-default" id="btnCopyLink">
            링크 복사하기
          </button>
          <!-- <button type="button" class="btn-share font-default" id="btnKakaoShare">
            카카오톡으로 공유하기
          </button> -->
        </div>
      </section>
    </main>

    <footer class="footer-credit">
      <p>
        © 2026. Designed & Developed by Minyule. 
        <a href="https://github.com/minyule/wedding-invitation" target="_blank" rel="noopener">
          GitHub
        </a>
      </p>
    </footer>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
